<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Nutricional</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <link rel="stylesheet" href="css/dashboard.css">
</head>
<body>

    <aside class="sidebar" id="sidebar-menu">
        <div class="profile-section">
            <img src="img/profile.jpg" alt="Perfil" class="profile-pic">
            <h2>Vinícius</h2>
            <p class="plan-badge">Plano: MAX</p>
            <button class="close-menu-mobile" id="close-menu"><i class="fa-solid fa-xmark"></i></button>
        </div>
        <nav class="nav-menu">
            <ul>
                <li><a href="#"><i class="fa-solid fa-dumbbell"></i> Treino</a></li>
                <li><a href="#"><i class="fa-solid fa-user-doctor"></i> Nutricionista</a></li>
                <li><a href="#" id="toggle-dark-mode"><i class="fa-solid fa-moon"></i> Modo Escuro</a></li>
            </ul>
        </nav>
    </aside>

    <header class="top-header">
        <div class="greeting-area" id="open-mobile-menu">
            <div class="menu-trigger"><i class="fa-solid fa-bars"></i></div>
            <div>
                <span class="date">Quarta-Feira, 10 de Junho</span>
                <h1>Olá, Vinícius 👋</h1>
            </div>
        </div>
        <button id="ai-camera-btn" class="ai-btn pulse-animation">
            <i class="fa-solid fa-camera"></i>
        </button>
    </header>

    <main class="main-content">
        </main>

    <script src="js/dashboard.js"></script>
</body>
</html>
