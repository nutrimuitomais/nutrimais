<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>App de Dieta e Receitas</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app-container">
        
        <header class="header">
            <div class="user-profile">
                <img src="https://i.pravatar.cc/150?img=11" alt="Avatar do Usuário" class="avatar">
                <div class="user-greeting">
                    <span class="greeting-name">Hi Alex</span>
                    <span class="greeting-time">Good Morning</span>
                </div>
            </div>
            <button class="notification-btn">🔔</button>
        </header>

        <h1 class="main-title">What are you craving<br>today, buddy?</h1>

        <div class="search-container">
            <span class="search-icon">🔍</span>
            <input type="text" class="search-input" placeholder="What are you craving today?">
            <button class="filter-btn">⚙️</button>
        </div>

        <main class="meal-section">
            <div class="meal-image-container">
                <img src="https://images.unsplash.com/photo-1621996346565-e3dbc646d9a9?auto=format&fit=crop&w=800&q=80" alt="Prato de Macarrão" class="meal-image">
            </div>

            <div class="nutrition-card">
                <h2 class="meal-name">Vegan Delight Bowl</h2>
                
                <div class="calories-section">
                    <div class="calories-text">
                        <span class="calories-label">Total Calories</span>
                        <div class="calories-value">
                            <strong>280</strong> <span class="kcal">Kcal</span>
                        </div>
                    </div>
                    <div class="calories-chart">
                        <div class="fire-icon">
                            🔥<br><span class="icon-kcal">kcal</span>
                        </div>
                    </div>
                </div>

                <div class="macros-section">
                    <div class="macro-card">
                        <div class="macro-circle protein-circle"></div>
                        <span class="macro-percent">9%</span>
                        <span class="macro-grams">15g</span>
                        <span class="macro-name">Protein</span>
                    </div>
                    <div class="macro-card">
                        <div class="macro-circle fat-circle"></div>
                        <span class="macro-percent">13%</span>
                        <span class="macro-grams">45g</span>
                        <span class="macro-name">Fat</span>
                    </div>
                    <div class="macro-card">
                        <div class="macro-circle carbs-circle"></div>
                        <span class="macro-percent">78%</span>
                        <span class="macro-grams">8g</span>
                        <span class="macro-name">Carbs</span>
                    </div>
                </div>
            </div>
        </main>

        <nav class="bottom-nav">
            <button class="nav-item active">🏠</button>
            <button class="nav-item">🍱</button>
            <button class="nav-item">💬</button>
            <button class="nav-item">👤</button>
        </nav>

    </div>
    
    <script src="script.js"></script>
</body>
</html>
