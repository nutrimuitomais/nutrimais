<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pagamento - Nutri+</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:transparent;
min-height:100vh;
padding:30px;
color:#fff;
}

.checkout{
max-width:850px;
margin:auto;
}

.titulo{
text-align:center;
font-size:42px;
font-weight:800;
margin-bottom:10px;
}

.subtitulo{
text-align:center;
opacity:.8;
margin-bottom:35px;
}

.card{
max-width:650px;
margin:auto;
background:#ffffff;
border-radius:28px;
padding:40px;
box-shadow:0 20px 50px rgba(0,0,0,.12);
color:#111;
}

.tag{
display:inline-block;
padding:8px 16px;
border-radius:999px;
background:#1db954;
font-weight:700;
margin-bottom:20px;
}

.plano{
font-size:30px;
font-weight:800;
margin-bottom:10px;
}

.tipo{
color:#6fd18c;
font-weight:700;
margin-bottom:15px;
}

.preco{
font-size:72px;
font-weight:900;
text-align:center;
margin:20px 0;
color:#111;
}

.economia{
background:rgba(111,209,140,.15);
border:1px solid rgba(111,209,140,.4);
padding:12px;
border-radius:14px;
color:#6fd18c;
font-weight:700;
margin-bottom:25px;
}

.metodos{
display:flex;
gap:10px;
margin-bottom:25px;
}

.metodo{
flex:1;
padding:10px;
font-size:14px;
border-radius:10px;
}

.metodo.ativo{
background:#1db954;
border-color:#1db954;
}

.pix-area,
.cartao-area{
display:none;
}

.ativo-area{
display:block;
}

.qrcode{
height:220px;
background:#fff;
border-radius:20px;
display:flex;
align-items:center;
justify-content:center;
color:#000;
font-weight:800;
margin-bottom:15px;
}

.pix-code,
input{
width:100%;
padding:15px;
border:none;
border-radius:12px;
margin-bottom:12px;
}

.linha{
display:flex;
gap:10px;
}

.cupom{
margin-top:20px;
}

.btn{
width:100%;
padding:16px;
border:none;
border-radius:14px;
background:#1db954;
color:#fff;
font-size:17px;
font-weight:800;
cursor:pointer;
}

.btn-cupom{
background:#111827;
margin-bottom:10px;
}

.desconto{
margin-top:10px;
color:#6fd18c;
font-weight:700;
}

.seguro{
margin-top:20px;
text-align:center;
opacity:.8;
}
    body{
background:transparent;
min-height:100vh;
padding:30px;
color:#fff;
}

body::before,
body::after{
content:"";
position:fixed;
inset:-40%;
z-index:-1;
animation-timing-function:ease-in-out;
animation-iteration-count:infinite;
animation-direction:alternate;
filter:blur(45px);
}

body::before{
background:
radial-gradient(55% 70% at 25% 30%, rgba(180,245,210,1) 0%, transparent 45%),
radial-gradient(55% 70% at 80% 25%, rgba(214,233,255,.7) 0%, transparent 55%),
radial-gradient(65% 80% at 55% 80%, rgba(233,221,255,.95) 0%, transparent 60%);
animation:fundoIA1 9s infinite;
}

body::after{
background:
radial-gradient(85% 95% at 70% 65%, rgba(170,240,205,1) 0%, transparent 50%),
radial-gradient(80% 95% at 30% 75%, rgba(220,215,255,.85) 0%, transparent 60%);
animation:fundoIA2 10s infinite;
}

@keyframes fundoIA1{
0%{transform:translate(0%,0%) scale(1.1);}
50%{transform:translate(-14%,-12%) scale(1.35);}
100%{transform:translate(12%,10%) scale(1.15);}
}

@keyframes fundoIA2{
0%{transform:translate(0%,0%) scale(1.15);}
50%{transform:translate(14%,-10%) scale(1.45);}
100%{transform:translate(-12%,12%) scale(1.2);}
}
</style>
</head>

<body>

<div class="checkout">

<h1 class="titulo">Finalize sua assinatura</h1>
<p class="subtitulo">
Pagamento seguro e liberação imediata.
</p>

<div class="card">

<div class="hero-pagamento">

<div class="hero-tag">
Plano Selecionado
</div>

<div id="nomePlano" class="plano"></div>

<div id="tipoPlano" class="tipo"></div>

<div class="preco">
R$ <span id="valorPlano"></span>
</div>

<div id="economia" class="economia"></div>

</div>

<div class="metodos">
    <div class="metodo ativo" onclick="trocarMetodo('pix',this)">
        PIX
    </div>

    <div class="metodo" onclick="trocarMetodo('credito',this)">
        Crédito
    </div>

    <div class="metodo" onclick="trocarMetodo('debito',this)">
        Débito
    </div>
</div>

<div id="pixArea" class="pix-area ativo-area">

<div class="qrcode">
QR CODE PIX
</div>

<input
class="pix-code"
readonly
value="00020126580014BR.GOV.BCB.PIX123456789987654321">

</div>

<div id="cartaoArea" class="cartao-area">

<input type="text" placeholder="Nome completo">

<input type="text" placeholder="Número do cartão">

<div class="linha">

<input type="text" placeholder="MM/AA">

<input type="text" placeholder="CVV">

</div>

</div>

<div class="cupom">

<input
type="text"
id="cupom"
placeholder="Cupom promocional">

<button
class="btn btn-cupom"
onclick="aplicarCupom()">
Aplicar cupom
</button>

<div id="msgCupom" class="desconto"></div>

</div>

<button
class="btn"
onclick="confirmarPagamento()">
Liberar meu acesso
</button>

<div class="seguro">
🔒 Pagamento seguro • Cancelamento simples
</div>

</div>

</div>

<script>

const plano =
JSON.parse(
localStorage.getItem("planoEscolhido")
);

if(!plano){
window.location.href="planos.html";
}

document.getElementById("nomePlano")
.innerText = plano.nome;

document.getElementById("tipoPlano")
.innerText =
plano.tipo === "anual"
? "Assinatura anual"
: "Assinatura mensal";

document.getElementById("valorPlano")
.innerText =
plano.preco.toFixed(2);

const economia =
document.getElementById("economia");

if(plano.tipo === "anual"){

if(plano.nome.includes("Digital")){
economia.innerText =
"🎉 Você economizou 17% escolhendo o plano anual";
}

else if(plano.nome.includes("Max")){
economia.innerText =
"🎁 Você ganhou 1 mês grátis";
}

else{
economia.innerText =
"🎁 Você ganhou 2 meses grátis";
}

}else{

economia.innerText =
"Plano mensal selecionado";

}

function trocarMetodo(tipo, el){

document.querySelectorAll(".metodo")
.forEach(item=>{
item.classList.remove("ativo");
});

el.classList.add("ativo");

document
.getElementById("pixArea")
.classList.remove("ativo-area");

document
.getElementById("cartaoArea")
.classList.remove("ativo-area");

if(tipo === "pix"){
document
.getElementById("pixArea")
.classList.add("ativo-area");
}else{
document
.getElementById("cartaoArea")
.classList.add("ativo");
}

}

const cupons = {
NUTRI2:2,
NUTRI3:3,
NUTRI4:4,
MAX5:5,
MAX6:6,
MAX7:7,
MAX8:8,
SUPER8:8,
SUPER9:9,
SUPER10:10
};

function aplicarCupom(){

const codigo =
document
.getElementById("cupom")
.value
.toUpperCase()
.trim();

const desconto =
cupons[codigo] || 0;

if(desconto){

const novoValor =
plano.preco - desconto;

document
.getElementById("valorPlano")
.innerText =
novoValor.toFixed(2);

document
.getElementById("msgCupom")
.innerText =
`Desconto aplicado: R$ ${desconto.toFixed(2)}`;

}else{

document
.getElementById("msgCupom")
.innerText =
"Cupom inválido";

}

}

function confirmarPagamento(){

localStorage.setItem(
"pagamentoAprovado",
"true"
);

window.location.href =
"anamnese.html";

}
function abrirPix(){

document
.getElementById("pixModal")
.classList.add("ativo");

}

function fecharPix(){

document
.getElementById("pixModal")
.classList.remove("ativo");

}
</script>
<div id="pixModal" class="pix-modal">

  <div class="pix-container">

    <h2>Pagamento via PIX</h2>

    <img
      id="qrCodePix"
      src="img/qrcode-pix.png"
      alt="QR Code PIX">

    <p>
      Escaneie o QR Code para concluir o pagamento.
    </p>

    <button
      class="btn-voltar"
      onclick="fecharPix()">
      Voltar
    </button>

  </div>

</div>
</body>
</html>
