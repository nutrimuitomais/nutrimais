<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Pagamento</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="css/estilo.css">
</head>
<body>

<div class="container">
  <h1 class="titulo-pagamento">
  Finalize sua assinatura
</h1>

<p class="sub-pagamento">
  Seu acesso será liberado imediatamente após a confirmação.
</p>

<div class="resumo-plano">

  <div class="badge-plano" id="planoNome"></div>

  <div class="preco-box-pagamento">
    <span id="planoPreco"></span>
  </div>

  <div id="descontoAplicado"></div>

  <div class="total-final">
    Total:
    <strong id="valorFinal"></strong>
  </div>

</div>

    <div class="metodo ativo">
  ⚡ PIX
</div>

<div class="metodo">
  💳 Crédito
</div>

<div class="metodo">
  💳 Débito
</div>
  
<div class="cupom-box">

  <label for="cupom">Cupom promocional</label>

  <input
    type="text"
    id="cupom"
    placeholder="Digite seu cupom"
  >

  <button type="button" onclick="aplicarCupom()">
    Aplicar cupom
  </button>

  <p id="descontoAplicado"></p>

</div>
    <div class="aviso">
      🔒 Transação protegida

      Seus dados são criptografados e processados em ambiente seguro.
    </div>

    <button class="btn" onclick="confirmarPagamento()">Liberar meu acesso</button>
  </div>
</div>

<script>
const plano = JSON.parse(localStorage.getItem("planoEscolhido"));

if (!plano) {
  window.location.href = "planos.html";
}

let descontoAtual = 0;

document.getElementById("planoNome").innerText = plano.nome;

document.getElementById("planoPreco").innerText =
"R$ " + plano.preco.toFixed(2);

document.getElementById("valorFinal").innerText =
"R$ " + plano.preco.toFixed(2);

function aplicarCupom(){

  const codigo =
  document.getElementById("cupom")
  .value
  .toUpperCase()
  .trim();

  let desconto = 0;

  if(plano.nome === "Nutri Digital"){
    if(["NUTRI2","NUTRI3","NUTRI4"].includes(codigo)){
      desconto = cupons[codigo];
    }
  }

  if(plano.nome === "Max Nutri"){
    if(["MAX5","MAX6","MAX7","MAX8"].includes(codigo)){
      desconto = cupons[codigo];
    }
  }

  if(plano.nome === "Super Nutri"){
    if(["SUPER8","SUPER9","SUPER10"].includes(codigo)){
      desconto = cupons[codigo];
    }
  }

  descontoAtual = desconto;

  const valorFinal =
  plano.preco - descontoAtual;

  if(desconto > 0){

    document.getElementById(
      "descontoAplicado"
    ).innerText =
    `Cupom aplicado: -R$ ${desconto.toFixed(2)}`;

  } else {

    document.getElementById(
      "descontoAplicado"
    ).innerText =
    "Cupom inválido para este plano.";

  }

  document.getElementById(
    "valorFinal"
  ).innerText =
  "R$ " + valorFinal.toFixed(2);

}

function confirmarPagamento() {

  localStorage.setItem(
    "pagamentoAprovado",
    "true"
  );

  const acesso = {
    ativo: true,
    inicio: new Date().toISOString(),
    fim: new Date(
      Date.now() + 31*24*60*60*1000
    ).toISOString()
  };

  localStorage.setItem(
    "acessoUsuario",
    JSON.stringify(acesso)
  );

  window.location.href = "anamnese.html";

}
</script>
<script>
const cupons = {
  NUTRI2: 2,
  NUTRI3: 3,
  NUTRI4: 4,

  MAX5: 5,
  MAX6: 6,
  MAX7: 7,
  MAX8: 8,

  SUPER8: 8,
  SUPER9: 9,
  SUPER10: 10
};
</script>
  
</body>
</html>
