<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pagamento - Nutri+</title>

<link rel="stylesheet" href="css/pagamento.css">

</head>
<body>

<div class="checkout">

<h1 class="titulo">
Finalize sua assinatura
</h1>

<p class="subtitulo">
Pagamento seguro e liberação imediata.
</p>

<div class="checkout-card">

<div class="hero-pagamento">

<div class="hero-tag">
Plano selecionado
</div>

<h2 id="nomePlano" class="plano">
Carregando...
</h2>

<div id="tipoPlano" class="tipo">
Assinatura
</div>

<div class="preco">
R$ <span id="valorPlano">0,00</span>
</div>

<div id="economia" class="economia">
</div>

<div class="resumo-plano">

<div>✓ Acesso imediato ao aplicativo</div>

<div>✓ Plano alimentar personalizado</div>

<div>✓ Atualizações periódicas</div>

</div>

</div>

<div class="metodos">

<button
class="metodo ativo"
onclick="trocarMetodo('pix',this)">
PIX
</button>

<button
class="metodo"
onclick="trocarMetodo('credito',this)">
CRÉDITO
</button>

<button
class="metodo"
onclick="trocarMetodo('debito',this)">
DÉBITO
</button>

</div>

<div id="pixArea" class="pix-area ativo-area">

<div class="qrcode">
QR CODE
</div>

<input
class="pix-code"
readonly
value="00020126580014BR.GOV.BCB.PIX123456789987654321">

</div>

<div id="cartaoArea" class="cartao-area">

<input
id="nomeCompleto"
type="text"
placeholder="Nome completo">

<input
id="numeroCartao"
type="text"
maxlength="19"
placeholder="Número do cartão">

<div id="bandeiraCartao"></div>

<div class="linha">

<input
id="validade"
type="text"
maxlength="5"
placeholder="MM/AA">

<input
type="text"
maxlength="3"
placeholder="CVV">

</div>

</div>

<div class="cupom-box">
<input
  type="email"
  id="email"
  placeholder="Digite seu Gmail">

<input
  type="password"
  id="senha"
  placeholder="Criar senha">
  
<input
type="text"
id="cupom"
placeholder="Cupom promocional">

<button
class="btn-cupom"
onclick="aplicarCupom()">
Aplicar cupom
</button>

<div id="msgCupom"></div>

</div>

<button
class="btn-pagamento"
onclick="confirmarPagamento()">
Liberar meu acesso
</button>

<div class="seguro">
🔒 Pagamento seguro • Cancelamento simples
</div>

</div>

</div>

<script src="js/pagamento.js"></script>

</body>
</html>
