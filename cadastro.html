<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Criar Conta - Nutri+</title>
<link rel="stylesheet" href="css/cadastro.css">
</head>
<body>

<div class="cadastro-container">
  <div class="cadastro-card">

    <h1>Nutri+</h1>

    <p class="subtitulo">
      Crie sua conta
    </p>

    <input
      type="text"
      id="nome"
      placeholder="Seu nome">

    <input
      type="email"
      id="email"
      placeholder="Seu Gmail">

    <input
      type="password"
      id="senha"
      placeholder="Crie uma senha">

    <input
      type="password"
      id="confirmarSenha"
      placeholder="Confirme sua senha">

    <button
      class="btn-cadastro"
      onclick="criarConta()">
      Criar Conta
    </button>

    <a href="login.html" class="link">
      Já tenho uma conta
    </a>

  </div>
</div>

<script src="js/cadastro.js"></script>

</body>
</html>
